<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2 class="mb-4">📦 Smart Inventory Manager</h2>

    <a href="/add" class="btn btn-primary mb-3">+ Add Product</a>

    <form action="/products" method="get" class="mb-3">

        <div class="input-group">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search product..."
                   th:value="${keyword}">

            <button class="btn btn-primary">Search</button>

            <a href="/products" class="btn btn-secondary">Reset</a>

        </div>

    </form>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>

            <td>
                <span class="badge bg-danger"
                      th:if="${product.quantity < product.reorderLevel}">
                    Low Stock
                </span>

                <span class="badge bg-success"
                      th:unless="${product.quantity < product.reorderLevel}">
                    In Stock
                </span>
            </td>

            <td>
                <a th:href="@{'/edit/' + ${product.id}}"
                   class="btn btn-sm btn-warning">
                    Edit
                </a>

                <a th:href="@{'/delete/' + ${product.id}}"
                   class="btn btn-sm btn-danger">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
