<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inventory Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins', sans-serif;
        }

        body{
            background-color:#f4f6f9;
        }

        /* Sidebar */

        .sidebar{
            height:100vh;
            width:230px;
            position:fixed;
            background:#111827;
            padding-top:25px;
            color:white;
            border-right:1px solid #2d3748;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:40px;
            font-weight:600;
        }

        .sidebar a{
            display:block;
            color:#d1d5db;
            text-decoration:none;
            padding:14px 22px;
            margin:10px;
            transition:0.3s;
            font-weight:500;
            border-left:3px solid transparent;
        }

        .sidebar a:hover{
            background:#1f2937;
            color:white;
            border-left:3px solid #0d6efd;
        }

        /* Main Content */

        .main-content{
            margin-left:250px;
            padding:35px;
        }

        .main-content h2{
            font-weight:600;
        }

        /* Buttons */

        .btn{
            border-radius:0px;
            font-weight:500;
            padding:10px 18px;
        }

        /* Search Box */

        .search-card{
            background:white;
            border:none;
            border-radius:0px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .form-control{
            border-radius:0px;
            padding:12px;
            border:1px solid #d1d5db;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#0d6efd;
        }

        /* Table */

        .table-card{
            background:white;
            border:none;
            border-radius:0px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .table th{
            font-weight:600;
        }

        .badge{
            border-radius:0px;
            padding:8px 10px;
            font-weight:500;
        }

    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <h3>Inventory</h3>

    <a href="/">Dashboard</a>

    <a href="/products">Manage Products</a>

    <a href="/add">Add Product</a>

</div>

<!-- Main Content -->
<div class="main-content">

    <h2 class="mb-4">Smart Inventory Manager</h2>

    <!-- Top Actions -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <a href="/add"
           class="btn btn-primary">
            + Add Product
        </a>

    </div>

    <!-- Search Section -->
    <div class="card search-card p-4 mb-4">

        <form action="/products"
              method="get">

            <div class="input-group">

                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search product..."
                       th:value="${keyword}">

                <button class="btn btn-primary">
                    Search
                </button>

                <a href="/products"
                   class="btn btn-secondary">
                    Reset
                </a>

            </div>

        </form>

    </div>

    <!-- Products Table -->
    <div class="card table-card p-4">

        <table class="table table-hover align-middle">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="product : ${products}">

                <td th:text="${product.id}"></td>

                <td th:text="${product.name}"></td>

                <td th:text="${product.category}"></td>

                <td th:text="'₹' + ${product.price}"></td>

                <td th:text="${product.quantity}"></td>

                <!-- Stock Status -->
                <td>

                    <span class="badge bg-danger"
                          th:if="${product.quantity < product.reorderLevel}">
                        Low Stock
                    </span>

                    <span class="badge bg-success"
                          th:unless="${product.quantity < product.reorderLevel}">
                        In Stock
                    </span>

                </td>

                <!-- Actions -->
                <td>

                    <a th:href="@{'/edit/' + ${product.id}}"
                       class="btn btn-sm btn-warning">
                        Edit
                    </a>

                    <a th:href="@{'/delete/' + ${product.id}}"
                       class="btn btn-sm btn-danger">
                        Delete
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
