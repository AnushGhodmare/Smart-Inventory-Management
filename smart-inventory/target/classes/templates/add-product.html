<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background-color:#f4f6f9;
        }

        /* Sidebar */

        .sidebar{
            height:100vh;
            width:230px;
            position:fixed;
            background:#111827;
            padding-top:25px;
            color:white;
            border-right:1px solid #2d3748;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:40px;
            font-weight:600;
        }

        .sidebar a{
            display:block;
            color:#d1d5db;
            text-decoration:none;
            padding:14px 22px;
            margin:10px;
            transition:0.3s;
            font-weight:500;
            border-left:3px solid transparent;
        }

        .sidebar a:hover{
            background:#1f2937;
            color:white;
            border-left:3px solid #0d6efd;
        }

        /* Main Content */

        .main-content{
            margin-left:250px;
            padding:35px;
        }

        .main-content h2{
            font-weight:600;
        }

        /* Form Card */

        .form-card{
            background:white;
            border:none;
            border-radius:0px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            border-top:4px solid #198754;
        }

        /* Inputs */

        .form-control{
            border-radius:0px;
            padding:12px;
            border:1px solid #d1d5db;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#0d6efd;
        }

        .form-label{
            font-weight:500;
            margin-bottom:8px;
        }

        /* Buttons */

        .btn{
            border-radius:0px;
            padding:10px 18px;
            font-weight:500;
        }

    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <h3>Inventory</h3>

    <a href="/">Dashboard</a>

    <a href="/products">Manage Products</a>

    <a href="/add">Add Product</a>

</div>

<!-- Main Content -->
<div class="main-content">

    <h2 class="mb-4">Add Product</h2>

    <div class="card form-card p-4">

        <form action="/save"
              method="post"
              th:object="${product}">

            <!-- Product Name -->
            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       placeholder="Enter product name">

            </div>

            <!-- Category -->
            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{category}"
                       placeholder="Enter category">

            </div>

            <!-- Price -->
            <div class="mb-3">

                <label class="form-label">
                    Price
                </label>

                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{price}"
                       placeholder="Enter price">

            </div>

            <!-- Quantity -->
            <div class="mb-3">

                <label class="form-label">
                    Quantity
                </label>

                <input type="number"
                       class="form-control"
                       th:field="*{quantity}"
                       placeholder="Enter quantity">

            </div>

            <!-- Reorder Level -->
            <div class="mb-4">

                <label class="form-label">
                    Reorder Level
                </label>

                <input type="number"
                       class="form-control"
                       th:field="*{reorderLevel}"
                       placeholder="Enter reorder level">

            </div>

            <!-- Buttons -->
            <button class="btn btn-success">
                Save Product
            </button>

            <a href="/products"
               class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
