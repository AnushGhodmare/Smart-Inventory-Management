<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

  <h2>✏ Edit Product</h2>

  <div class="card p-4">

    <form action="/save" method="post" th:object="${product}">

      <input type="hidden" th:field="*{id}"/>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" th:field="*{name}">
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <input class="form-control" th:field="*{category}">
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" th:field="*{price}">
      </div>

      <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input class="form-control" th:field="*{quantity}">
      </div>

      <div class="mb-3">
        <label class="form-label">Reorder Level</label>
        <input class="form-control" th:field="*{reorderLevel}">
      </div>

      <button class="btn btn-success">Update Product</button>
      <a href="/products" class="btn btn-secondary">Back</a>

    </form>

  </div>

</div>
</body>
</html>
