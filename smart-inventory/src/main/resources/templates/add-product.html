<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2 class="mb-4">➕ Add Product</h2>

    <div class="card p-4">

        <form action="/save" method="post" th:object="${product}">

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" th:field="*{name}">
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" th:field="*{category}">
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}">
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" th:field="*{quantity}">
            </div>

            <div class="mb-3">
                <label class="form-label">Reorder Level</label>
                <input type="number" class="form-control" th:field="*{reorderLevel}">
            </div>

            <button class="btn btn-success">Save Product</button>
            <a href="/products" class="btn btn-secondary">Back</a>

        </form>

    </div>

</div>
</body>
</html>
